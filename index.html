    function showStationPlot(stationId, stationName, variableName, variableLabel) {
        const d = stationPlotData[String(stationId)];
        if (!d || !d.time || d.time.length === 0 || !d[variableName]) {
            alert("No 24h data available for " + variableLabel + " at station " + stationId);
            return;
        }

        const panel = document.getElementById("plot-panel");
        const title = document.getElementById("plot-title");
        panel.style.display = "block";
        title.innerHTML = stationName + " - " + variableLabel + " - Last 24 Hours";

        const trace = {
            x: d.time,
            y: d[variableName],
            mode: "lines+markers",
            name: variableLabel
        };

        const layout = {
            margin: {l: 55, r: 30, t: 35, b: 45},
            paper_bgcolor: "white",
            plot_bgcolor: "white",
            xaxis: {
                title: "Time"
            },
            yaxis: {
                title: variableLabel
            },
            legend: {
                orientation: "h",
                yanchor: "bottom",
                y: 1.02,
                xanchor: "left",
                x: 0
            }
        };

        Plotly.newPlot("plot-container", [trace], layout, {responsive: true});
    }

    function closePlotPanel() {
        document.getElementById("plot-panel").style.display = "none";
    }
